<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart To-Do App</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="floating-icons">
<div class="icon alarm">⏰</div>
<div class="icon calc">🧮</div>
<div class="icon pen">🖊</div>
<div class="icon book">📓</div>
</div>

<div class="container">

<h1>Smart To-Do List</h1>

<div class="clockBox">

<div id="clock"></div>
<div id="todayDate"></div>

</div>

<button id="modeToggle">🌙 Toggle Mode</button>

<div class="inputBox">

<input id="taskInput" placeholder="Enter task">

<select id="priority">
<option value="low">Low</option>
<option value="medium">Medium</option>
<option value="high">High</option>
</select>

<input type="date" id="dueDate">
<input type="time" id="dueTime">

<button onclick="addTask()">Add</button>

</div>

<ul id="taskList"></ul>

<div class="stats">

<div>Total: <span id="totalTasks">0</span></div>
<div>Completed: <span id="completedTasks">0</span></div>
<div>Pending: <span id="pendingTasks">0</span></div>

</div>

<div class="progressContainer">
<div id="progressBar"></div>
</div>

<button onclick="clearTasks()" class="clearBtn">Clear All</button>

</div>

<script src="script.js"></script>

</body>
</html>
